<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - EcoSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2d6a4f; --bg: #f4f7f6; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 250px; height: 100vh; background: var(--primary); color: white; padding: 20px; position: fixed; }
        .sidebar h2 { font-size: 20px; margin-bottom: 30px; text-align: center; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar li { padding: 15px; cursor: pointer; border-radius: 8px; margin-bottom: 10px; transition: 0.3s; }
        .sidebar li:hover, .sidebar li.active { background: rgba(255,255,255,0.2); }
        .sidebar i { margin-right: 10px; }

        /* Main Content */
        .main-content { margin-left: 250px; width: calc(100% - 250px); padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* Stats Cards */
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card h3 { font-size: 14px; color: #888; margin-bottom: 10px; }
        .card p { font-size: 24px; font-weight: 700; color: var(--primary); }

        /* Table & Form */
        .data-section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #eee; color: #666; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .btn-add { background: var(--primary); color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        
        /* Modal Form */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; }
        .modal-content { background: white; width: 400px; margin: 50px auto; padding: 30px; border-radius: 12px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2><i class="fas fa-leaf"></i> ECO ADMIN</h2>
        <ul>
            <li class="active"><i class="fas fa-box"></i> Sản phẩm</li>
            <li><i class="fas fa-shopping-cart"></i> Đơn hàng</li>
            <li><i class="fas fa-chart-line"></i> Báo cáo</li>
            <li><i class="fas fa-cog"></i> Cài đặt</li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Quản Lý Sản Phẩm</h1>
            <button class="btn-add" onclick="showModal()">+ Thêm Sản Phẩm</button>
        </div>

        <div class="stats">
            <div class="card"><h3>Tổng Sản Phẩm</h3><p id="total-p">3</p></div>
            <div class="card"><h3>Đơn Hàng Mới</h3><p>12</p></div>
            <div class="card"><h3>Doanh Thu (Tháng)</h3><p>8.500.000đ</p></div>
        </div>

        <div class="data-section">
            <h3>Danh sách sản phẩm</h3>
            <table>
                <thead>
                    <tr>
                        <th>Tên sản phẩm</th>
                        <th>Giá</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="product-list">
                    <tr>
                        <td>Ốp Lưng Sợi Cà Phê</td>
                        <td>290.000đ</td>
                        <td><span style="color: green;">Còn hàng</span></td>
                        <td><i class="fas fa-edit"></i> <i class="fas fa-trash" style="color:red; margin-left:10px;"></i></td>
                    </tr>
                    </tbody>
            </table>
        </div>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <h3>Thêm Sản Phẩm Mới</h3>
            <input type="text" id="p-name" placeholder="Tên sản phẩm">
            <input type="number" id="p-price" placeholder="Giá bán (VNĐ)">
            <input type="text" id="p-img" placeholder="Link ảnh (Unsplash...)">
            <button class="btn-add" style="width: 100%;" onclick="addProduct()">Lưu Sản Phẩm</button>
            <button onclick="hideModal()" style="width: 100%; background:none; border:none; margin-top:10px; cursor:pointer; color:#888;">Hủy</button>
        </div>
    </div>

    <script>
        function showModal() { document.getElementById('addModal').style.display = 'block'; }
        function hideModal() { document.getElementById('addModal').style.display = 'none'; }

        function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            
            if(!name || !price) return alert("Vui lòng nhập đủ thông tin!");

            const table = document.getElementById('product-list');
            const row = `<tr>
                <td>${name}</td>
                <td>${parseInt(price).toLocaleString()}đ</td>
                <td><span style="color: green;">Còn hàng</span></td>
                <td><i class="fas fa-edit"></i> <i class="fas fa-trash" style="color:red; margin-left:10px;"></i></td>
            </tr>`;
            
            table.innerHTML += row;
            document.getElementById('total-p').innerText = table.rows.length;
            
            alert("Đã thêm sản phẩm thành công (Lưu ý: Dữ liệu này sẽ mất khi bạn tải lại trang vì GitHub Pages không có Database)");
            hideModal();
        }
    </script>
</body>
</html>
