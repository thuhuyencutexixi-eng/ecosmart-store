<!DOCTYPE html>
<html lang="vi">
<head>
    <style>
        .admin-box { max-width: 500px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; background: #fff; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h2>Hệ thống niêm yết sản phẩm</h2>
        <input type="text" id="pName" placeholder="Tên sản phẩm (Vd: Dầu gội Herbal Scent)">
        <input type="number" id="pPrice" placeholder="Giá tiền">
        <select id="pCategory">
            <option value="travel">Travel Kit</option>
            <option value="bottle">Chai lẻ</option>
        </select>
        <button onclick="addProduct()" style="width:100%; background: #28a745; color:white; padding:10px;">Niêm yết sản phẩm</button>
    </div>

    <script>
        function addProduct() {
            const name = document.getElementById('pName').value;
            alert("Đã niêm yết thành công sản phẩm: " + name);
            // Ở đây sẽ dùng fetch() để gửi dữ liệu lên server
        }
    </script>
</body>
</html>
