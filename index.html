<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ecofami - Sống Xanh Mỗi Hành Trình</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; color: #333; margin: 0; }
        header { background: #2d5a27; color: white; padding: 20px; text-align: center; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .product-card { background: white; border-radius: 8px; margin: 15px; width: 250px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; }
        .product-card img { width: 100%; height: 200px; object-fit: cover; }
        .info { padding: 15px; text-align: center; }
        .price { color: #2d5a27; font-weight: bold; font-size: 1.2em; }
        button { background: #2d5a27; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1>ECOFAMI SHOP</h1>
        <p>Mang Ecofami theo mọi hành trình</p>
    </header>
    <div class="container" id="product-list">
        </div>

    <script>
        // Giả lập lấy dữ liệu từ phần Admin
        const products = [
            { name: "Eco Silk 2 in 1", price: "150.000đ", img: "eco-silk.jpg" },
            { name: "Ecofami Travel Kit", price: "350.000đ", img: "travel-kit.jpg" }
        ];

        const list = document.getElementById('product-list');
        products.forEach(p => {
            list.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}" alt="${p.name}">
                    <div class="info">
                        <h3>${p.name}</h3>
                        <p class="price">${p.price}</p>
                        <button>Thêm vào giỏ hàng</button>
                    </div>
                </div>`;
        });
    </script>
</body>
</html>
